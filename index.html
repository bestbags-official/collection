<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-NASR Luxury | النصر للفخامة</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cairo:wght@300;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); color: #fff; scroll-behavior: smooth; overflow-x: hidden; }
        .serif-title { font-family: 'Cinzel', serif; letter-spacing: 2px; }
        
        /* خلفية تفاعلية */
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a150a 0%, #050505 100%);
            z-index: -1;
        }

        /* كارت المنتج المطور */
        .p-card {
            background: linear-gradient(145deg, #0f0f0f, #151515);
            border: 1px solid rgba(212, 175, 55, 0.05);
            transition: all 0.8s cubic-bezier(0.15, 0.83, 0.66, 1);
            position: relative; overflow: hidden;
        }
        .p-card:hover {
            border-color: var(--gold);
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }
        
        /* إضاءة ذهبية تتحرك مع الماوس */
        .p-card::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(212,175,55,0.1) 0%, transparent 50%);
            opacity: 0; transition: opacity 0.5s;
        }
        .p-card:hover::after { opacity: 1; }

        .btn-luxe {
            background: linear-gradient(90deg, #d4af37, #b08d26);
            color: #000; font-weight: 900;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
            transition: 0.4s;
        }
        .btn-luxe:hover { letter-spacing: 2px; box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4); }

        /* أنيميشن الدخول */
        .reveal { opacity: 0; transform: translateY(30px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>

    <nav class="fixed top-0 w-full z-[100] px-10 py-8 flex justify-between items-center mix-blend-difference">
        <div id="masterLogo" class="serif-title text-3xl font-bold text-[#d4af37] cursor-pointer select-none">AL-NASR</div>
        <div class="flex gap-10 text-[10px] font-bold uppercase tracking-[0.4em]">
            <a href="#collection" class="hover:text-[#d4af37] transition">Collections</a>
            <a href="https://wa.me/249900623733" class="text-[#d4af37]">Concierge</a>
        </div>
    </nav>

    <section class="h-screen flex flex-col justify-center items-center text-center relative px-6">
        <span class="text-[#d4af37] text-[11px] font-bold tracking-[0.8em] mb-6 uppercase block reveal">Exclusive Leatherworks</span>
        <h1 class="serif-title text-6xl md:text-[10rem] leading-none mb-8 reveal">ARTISTRY</h1>
        <p class="max-w-xl text-gray-400 text-sm leading-[2] tracking-widest reveal">نصيغ الجلود كقطع موسيقية.. فريدة، يدوية، وخالدة.</p>
        <div class="mt-12 reveal">
            <a href="#collection" class="btn-luxe px-12 py-5 rounded-full text-xs uppercase">ابدأ الرحلة</a>
        </div>
    </section>

    <section id="collection" class="py-32 max-w-[1400px] mx-auto px-8">
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-20">
            </div>
    </section>

    <section id="adminZone" class="hidden py-32 bg-[#080808] border-t border-gold/10">
        <div class="max-w-2xl mx-auto p-12 bg-white/5 rounded-[40px] backdrop-blur-md">
            <h2 class="serif-title text-2xl mb-10 text-gold">إضافة تحفة جديدة</h2>
            <div class="space-y-6">
                <input type="text" id="pName" placeholder="الاسم" class="w-full bg-white/5 p-5 rounded-2xl outline-none focus:ring-1 ring-gold">
                <input type="number" id="pPrice" placeholder="السعر" class="w-full bg-white/5 p-5 rounded-2xl outline-none">
                <textarea id="pDesc" placeholder="قصة هذه القطعة..." class="w-full bg-white/5 p-5 rounded-2xl h-40 outline-none"></textarea>
                <input type="file" id="pFiles" multiple class="block text-sm text-gray-500">
                <button onclick="uploadProduct()" id="uploadBtn" class="btn-luxe w-full py-5 rounded-2xl">تأكيد الإضافة</button>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center opacity-30 text-[9px] tracking-[1em]">
        AL-NASR LUXURY HANDMADE 2026
    </footer>

    <div id="pModal" class="fixed inset-0 z-[200] hidden bg-black/98 backdrop-blur-3xl p-6 overflow-y-auto">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-16 min-h-screen items-center">
            <button onclick="closeModal()" class="fixed top-10 left-10 text-gold text-4xl">✕</button>
            
            <div class="w-full lg:w-2/3 space-y-4">
                <div class="aspect-square rounded-[40px] overflow-hidden bg-white/5">
                    <img id="mainImg" class="w-full h-full object-contain transition-transform duration-700 hover:scale-150 cursor-zoom-in">
                </div>
                <div id="thumbStrip" class="flex gap-4 p-2 justify-center"></div>
            </div>

            <div class="w-full lg:w-1/3 text-right">
                <h3 id="pTitle" class="serif-title text-5xl mb-6 text-gold"></h3>
                <p id="pPriceLabel" class="text-3xl font-light mb-10 text-gray-300"></p>
                <div class="h-px bg-gold/20 mb-10"></div>
                <p id="pDescription" class="text-gray-400 leading-[2] text-lg mb-12 italic"></p>
                
                <div class="flex gap-6">
                    <button id="orderWA" class="btn-luxe flex-1 py-6 rounded-3xl text-sm">طلب القطعة الآن</button>
                    <button id="dlBtn" class="bg-white/5 px-8 rounded-3xl hover:bg-white/10 transition">
                        <svg width="24" height="24" fill="gold" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="loginBox" class="fixed inset-0 z-[300] hidden bg-black flex items-center justify-center">
        <div class="w-80 space-y-6">
            <h2 class="serif-title text-center text-gold">ADMIN ACCESS</h2>
            <input type="email" id="admEmail" placeholder="EMAIL" class="w-full bg-white/5 p-4 rounded-xl text-center outline-none">
            <input type="password" id="admPass" placeholder="PASSWORD" class="w-full bg-white/5 p-4 rounded-xl text-center outline-none">
            <button onclick="doLogin()" class="btn-luxe w-full py-4 rounded-xl">UNLOCK</button>
            <button onclick="document.getElementById('loginBox').style.display='none'" class="w-full text-[10px] text-gray-600">CANCEL</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bxbglomvulnzehruubdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4Ymdsb212dWxuemVocnV1YmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg5MDYsImV4cCI6MjA5MjUxNDkwNn0.rqIZHvP47QugH9vG0LW8OkkmAVYEzhOwv-VUKJuEqOY';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let masterProducts = [];

        // نظام الدخول السري: اضغط مطولاً على اللوجو لمدة 3 ثوانٍ
        let logoTimer;
        const logo = document.getElementById('masterLogo');
        logo.onmousedown = () => logoTimer = setTimeout(() => document.getElementById('loginBox').style.display='flex', 3000);
        logo.onmouseup = () => clearTimeout(logoTimer);

        async function doLogin() {
            const { error } = await _client.auth.signInWithPassword({
                email: document.getElementById('admEmail').value,
                password: document.getElementById('admPass').value
            });
            if (error) alert("Access Denied");
            else location.reload();
        }

        function openModal(id) {
            const p = masterProducts.find(x => x.id == id);
            document.getElementById('pTitle').innerText = p.name;
            document.getElementById('pPriceLabel').innerText = `${p.price} SDG`;
            document.getElementById('pDescription').innerText = p.description || "قطعة صُنعت يدوياً بشغف وتفرد.";
            document.getElementById('mainImg').src = p.images[0];
            
            const thumbs = document.getElementById('thumbStrip');
            thumbs.innerHTML = p.images.map(i => `<img src="${i}" onclick="document.getElementById('mainImg').src='${i}'" class="w-20 h-20 object-cover rounded-2xl cursor-pointer border border-white/10 hover:border-gold">`).join('');

            const msg = encodeURIComponent(`مرحباً النصر للفخامة،\nأود طلب هذه القطعة الفنية:\n\nالاسم: ${p.name}\nالسعر: ${p.price} SDG\nالوصف: ${p.description}\n\nشكراً لك.`);
            document.getElementById('orderWA').onclick = () => window.open(`https://wa.me/249900623733?text=${msg}`);
            
            document.getElementById('dlBtn').onclick = async () => {
                const res = await fetch(p.images[0]);
                const blob = await res.blob();
                const l = document.createElement('a'); l.href = URL.createObjectURL(blob); l.download = `${p.name}.jpg`; l.click();
            };

            document.getElementById('pModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('pModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        async function uploadProduct() {
            const btn = document.getElementById('uploadBtn');
            const files = document.getElementById('pFiles').files;
            btn.innerText = "AUTHENTICATING...";
            try {
                let urls = [];
                for (let f of files) {
                    const n = `${Date.now()}_${f.name}`;
                    await _client.storage.from('product-images').upload(n, f);
                    const { data } = _client.storage.from('product-images').getPublicUrl(n);
                    urls.push(data.publicUrl);
                }
                await _client.from('products').insert([{
                    name: document.getElementById('pName').value,
                    price: document.getElementById('pPrice').value,
                    description: document.getElementById('pDesc').value,
                    images: urls
                }]);
                location.reload();
            } catch (e) { alert("Error"); }
        }

        async function load() {
            const { data } = await _client.from('products').select('*').order('created_at', {ascending: false});
            masterProducts = data || [];
            const grid = document.getElementById('productsGrid');
            const sess = await _client.auth.getSession();
            const isAdmin = sess.data.session;

            grid.innerHTML = masterProducts.map(p => `
                <div class="p-card rounded-[40px] p-6 group" onmousemove="this.style.setProperty('--x', event.offsetX + 'px'); this.style.setProperty('--y', event.offsetY + 'px')">
                    <div class="relative aspect-square overflow-hidden rounded-[30px] mb-8 cursor-pointer" onclick="openModal('${p.id}')">
                        <img src="${p.images[0]}" class="w-full h-full object-cover grayscale-[0.8] group-hover:grayscale-0 transition-all duration-1000 group-hover:scale-110">
                        <div class="absolute top-6 right-6 bg-black/50 backdrop-blur-md px-4 py-1 rounded-full text-[8px] tracking-widest text-gold opacity-0 group-hover:opacity-100 transition">LIMITED</div>
                    </div>
                    <div class="flex justify-between items-end">
                        <div>
                            <h3 class="serif-title text-xl mb-2">${p.name}</h3>
                            <p class="text-gold font-bold text-sm tracking-widest">${p.price} SDG</p>
                        </div>
                        <button onclick="openModal('${p.id}')" class="bg-white/5 p-4 rounded-full hover:bg-gold transition">
                            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                        </button>
                    </div>
                    ${isAdmin ? `<button onclick="deleteP('${p.id}')" class="mt-4 text-[8px] text-red-500 underline">DELETE FROM VAULT</button>` : ''}
                </div>
            `).join('');

            if(isAdmin) document.getElementById('adminZone').classList.remove('hidden');
            
            // تفعيل أنيميشن الظهور
            setTimeout(() => document.querySelectorAll('.reveal').forEach(el => el.classList.add('active')), 100);
        }

        async function deleteP(id) { if(confirm("حذف؟")) { await _client.from('products').delete().eq('id', id); location.reload(); } }

        load();
    </script>
</body>
</html>
