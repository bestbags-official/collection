<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSTI MARKET | الرفع المباشر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #f8fafc; }
        .section-view { display: none; }
        .section-view.active { display: block; }
        .product-card { background: white; border-radius: 1.5rem; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .nav-item { cursor: pointer; padding: 10px 20px; font-weight: bold; }
        .nav-item.active { color: #2563eb; border-bottom: 3px solid #2563eb; }
    </style>
</head>
<body class="pb-28">

    <header class="bg-white sticky top-0 z-50 border-b shadow-sm">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-900" onclick="showSection('all')">KOSTI<span class="text-blue-500">MARKET</span></h1>
            <button onclick="showSection('vendor')" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold">لوحة التاجر</button>
        </div>
        <nav class="flex gap-4 px-4 overflow-x-auto no-scrollbar border-t text-sm">
            <div onclick="showSection('all')" class="nav-item active">الكل</div>
            <div onclick="showSection('phones')" class="nav-item">هواتف</div>
            <div onclick="showSection('clothes')" class="nav-item">ملابس</div>
            <div onclick="showSection('cars')" class="nav-item">سيارات</div>
        </nav>
    </header>

    <main class="container mx-auto px-4 mt-6">
        <div id="section-all" class="section-view active">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="grid-all"></div>
        </div>
        <div id="section-phones" class="section-view"><div class="grid grid-cols-2 gap-4" id="grid-phones"></div></div>
        <div id="section-clothes" class="section-view"><div class="grid grid-cols-2 gap-4" id="grid-clothes"></div></div>
        <div id="section-cars" class="section-view"><div class="grid grid-cols-1 gap-4" id="grid-cars"></div></div>

        <div id="section-vendor" class="section-view">
            <div class="bg-white p-6 rounded-3xl shadow-lg max-w-lg mx-auto">
                <h3 class="text-xl font-black mb-6 text-center">إضافة منتج جديد (رفع مباشر)</h3>
                <div class="space-y-4">
                    <input type="text" id="p-name" placeholder="اسم المنتج" class="w-full p-4 bg-gray-50 rounded-2xl border">
                    <input type="number" id="p-price" placeholder="السعر" class="w-full p-4 bg-gray-50 rounded-2xl border">
                    <select id="p-cat" class="w-full p-4 bg-gray-50 rounded-2xl border font-bold">
                        <option value="phones">هواتف</option>
                        <option value="clothes">ملابس</option>
                        <option value="cars">سيارات</option>
                    </select>
                    
                    <div class="border-2 border-dashed border-blue-200 p-4 rounded-2xl text-center bg-blue-50">
                        <label class="cursor-pointer block">
                            <span class="text-blue-600 font-bold">📸 اضغط هنا لاختيار صورة من هاتفك</span>
                            <input type="file" id="p-file" accept="image/*" class="hidden">
                        </label>
                        <p id="file-status" class="text-xs text-gray-500 mt-2">لم يتم اختيار ملف</p>
                    </div>

                    <button onclick="addProductFromPhone()" class="w-full bg-blue-900 text-white py-4 rounded-2xl font-black shadow-lg">نشر المنتج الآن</button>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 inset-x-0 mx-auto w-[90%] md:w-[400px] bg-white shadow-2xl rounded-3xl p-4 flex justify-between items-center z-50 border">
        <span id="cart-total" class="font-black text-blue-900 text-xl">0 ج.س</span>
        <button onclick="checkout()" class="bg-green-500 text-white px-8 py-2 rounded-xl font-bold">اطلب الآن</button>
    </div>

    <script>
        let db = [];
        let cartTotal = 0;

        // تحديث اسم الملف المختار
        document.getElementById('p-file').onchange = function() {
            document.getElementById('file-status').innerText = "تم اختيار: " + this.files[0].name;
        };

        function showSection(id) {
            document.querySelectorAll('.section-view').forEach(s => s.classList.remove('active'));
            document.getElementById(`section-${id}`).classList.add('active');
            renderAll();
        }

        function addProductFromPhone() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const cat = document.getElementById('p-cat').value;
            const fileInput = document.getElementById('p-file');

            if (name && price && fileInput.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const newItem = {
                        id: Date.now(),
                        name: name,
                        price: price,
                        cat: cat,
                        img: e.target.result // تحويل الصورة لكود بيانات مباشر
                    };
                    db.unshift(newItem);
                    alert("تم الرفع والنشر بنجاح!");
                    showSection('all');
                };
                reader.readAsDataURL(fileInput.files[0]);
            } else {
                alert("يرجى ملء البيانات واختيار صورة!");
            }
        }

        function renderAll() {
            const grids = ['all', 'phones', 'clothes', 'cars'];
            grids.forEach(g => {
                const container = document.getElementById(`grid-${g}`);
                if(!container) return;
                const items = g === 'all' ? db : db.filter(i => i.cat === g);
                container.innerHTML = items.length ? '' : '<p class="col-span-full text-center text-gray-400 py-10">لا توجد منتجات حالياً</p>';
                items.forEach(item => {
                    container.innerHTML += `
                        <div class="product-card">
                            <img src="${item.img}" class="w-full h-40 object-cover">
                            <div class="p-3">
                                <h4 class="font-bold text-sm truncate">${item.name}</h4>
                                <div class="flex justify-between items-center mt-2">
                                    <span class="text-blue-600 font-black">${item.price} ج.س</span>
                                    <button onclick="addToCart(${item.price})" class="bg-gray-100 p-2 rounded-lg text-xs">🛒</button>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        function addToCart(p) {
            cartTotal += parseInt(p);
            document.getElementById('cart-total').innerText = cartTotal.toLocaleString() + " ج.س";
        }

        function checkout() {
            window.open("https://wa.me/249123456789?text=أريد طلب المنتجات المختارة");
        }
    </script>
</body>
</html>
