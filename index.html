<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOSTI MARKET PRO | كوستي ماركت</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; }
        .category-card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body>

    <header class="bg-blue-700 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold italic">KOSTI MARKET</h1>
            <nav class="hidden md:flex gap-6">
                <a href="#" onclick="filterCategory('all')" class="hover:text-yellow-400">الرئيسية</a>
                <a href="#vendor-section" class="hover:text-yellow-400">لوحة التاجر</a>
            </nav>
            <button onclick="document.getElementById('vendor-modal').classList.toggle('hidden')" class="bg-yellow-500 text-blue-900 px-4 py-2 rounded-lg font-bold">إضافة منتج +</button>
        </div>
    </header>

    <div class="bg-white shadow-sm overflow-x-auto">
        <div class="container mx-auto px-4 py-3 flex gap-4 text-sm font-bold whitespace-nowrap">
            <button onclick="filterCategory('clothes')" class="px-4 py-2 bg-gray-100 rounded-full hover:bg-blue-100">الملابس</button>
            <button onclick="filterCategory('phones')" class="px-4 py-2 bg-gray-100 rounded-full hover:bg-blue-100">الهواتف</button>
            <button onclick="filterCategory('cars')" class="px-4 py-2 bg-gray-100 rounded-full hover:bg-blue-100">السيارات</button>
            <button onclick="filterCategory('electric')" class="px-4 py-2 bg-gray-100 rounded-full hover:bg-blue-100">أدوات كهربائية</button>
        </div>
    </div>

    <main class="container mx-auto px-4 py-8">
        <h2 id="category-title" class="text-xl font-bold mb-6 border-r-4 border-blue-700 pr-3">كل المنتجات</h2>
        
        <div id="products-container" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="vendor-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-xl p-6 w-full max-w-md">
            <h3 class="text-lg font-bold mb-4 text-center">إضافة منتج جديد (لوحة التاجر)</h3>
            <div class="space-y-4">
                <input type="text" id="p-name" placeholder="اسم المنتج" class="w-full border p-2 rounded">
                <select id="p-cat" class="w-full border p-2 rounded">
                    <option value="clothes">ملابس</option>
                    <option value="phones">هواتف</option>
                    <option value="cars">سيارات</option>
                    <option value="electric">أدوات كهربائية</option>
                </select>
                <input type="number" id="p-price" placeholder="السعر الأصلي للتاجر" class="w-full border p-2 rounded">
                <p class="text-xs text-gray-500">* سيتم إضافة عمولة 10% تلقائياً على السعر المعرض.</p>
                <button onclick="addProduct()" class="w-full bg-blue-700 text-white py-3 rounded-lg font-bold">نشر المنتج</button>
                <button onclick="document.getElementById('vendor-modal').classList.add('hidden')" class="w-full text-gray-500">إلغاء</button>
            </div>
        </div>
    </div>

    <a href="https://wa.me/249XXXXXXXXX" class="fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition">
        <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.891 11.891-11.891 3.181 0 6.167 1.24 8.407 3.481 2.242 2.242 3.483 5.23 3.483 8.411 0 6.556-5.332 11.891-11.891 11.891-2.01 0-3.991-.51-5.747-1.474l-6.342 1.7zm6.349-4.116l.456.271c1.511.903 3.243 1.38 5.033 1.38 5.453 0 9.891-4.438 9.891-9.891 0-2.646-1.03-5.132-2.901-7.003-1.871-1.871-4.357-2.901-7.003-2.901-5.453 0-9.891 4.438-9.891 9.891 0 2.13.593 4.21 1.717 6.009l.298.476-1.12 4.09 4.18-.11z"/></svg>
    </a>

    <script>
        // قاعدة بيانات تجريبية
        let products = [
            { id: 1, name: "آيفون 15 برو", price: 1200, category: "phones", img: "https://via.placeholder.com/150" },
            { id: 2, name: "طقم كاجوال صيفي", price: 45, category: "clothes", img: "https://via.placeholder.com/150" },
        ];

        const commission = 0.10; // 10% عمولة

        function displayProducts(filteredList) {
            const container = document.getElementById('products-container');
            container.innerHTML = '';
            
            filteredList.forEach(p => {
                const finalPrice = p.price + (p.price * commission);
                container.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm category-card border border-gray-100">
                        <img src="${p.img}" class="w-full h-40 object-cover rounded-lg mb-4">
                        <span class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">${p.category}</span>
                        <h3 class="font-bold mt-2">${p.name}</h3>
                        <div class="flex justify-between items-center mt-4">
                            <span class="text-green-600 font-bold">${finalPrice} $</span>
                            <button onclick="sendOrder('${p.name}', ${finalPrice})" class="bg-green-500 text-white px-3 py-1 rounded-md text-sm">طلب عبر واتساب</button>
                        </div>
                    </div>
                `;
            });
        }

        function filterCategory(cat) {
            if(cat === 'all') {
                displayProducts(products);
                document.getElementById('category-title').innerText = "كل المنتجات";
            } else {
                const filtered = products.filter(p => p.category === cat);
                displayProducts(filtered);
                document.getElementById('category-title').innerText = "قسم: " + cat;
            }
        }

        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = parseFloat(document.getElementById('p-price').value);
            const cat = document.getElementById('p-cat').value;

            if(name && price) {
                products.push({ id: Date.now(), name, price, category: cat, img: "https://via.placeholder.com/150" });
                displayProducts(products);
                document.getElementById('vendor-modal').classList.add('hidden');
                alert("تم إضافة المنتج بنجاح مع احتساب العمولة!");
            }
        }

        function sendOrder(name, price) {
            const phone = "249XXXXXXXXX"; // ضع رقمك هنا
            const message = `مرحباً كوستي ماركت، أريد طلب: ${name}\nالسعر الإجمالي: ${price} $`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`);
        }

        // تشغيل العرض الأول
        displayProducts(products);
    </script>
</body>
</html>
