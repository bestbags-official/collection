<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kosti Market | Pro Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --shein-black: #222;
      --shein-red: #fa6338;
      --gray-bg: #f7f7f7;
      --border: #eeeeee;
      --text-gray: #666;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
    body { background-color: #fff; color: var(--shein-black); padding-bottom: 70px; }

    /* Navigation Logic */
    .page-section { display: none; padding: 15px; animation: fadeIn 0.3s; }
    .page-section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    /* Header */
    header { position: sticky; top: 0; z-index: 1000; background: #fff; border-bottom: 1px solid var(--border); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 20px; font-weight: 900; letter-spacing: 1px; }
    .user-status-dot { width: 10px; height: 10px; background: #ccc; border-radius: 50%; display: inline-block; margin-left: 5px; }
    .status-online { background: #27ae60; }

    /* Product Cards (SHEIN Style) */
    .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .p-card { background: #fff; border-bottom: 1px solid var(--border); margin-bottom: 10px; }
    .p-img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: var(--gray-bg); border-radius: 4px; }
    .p-info { padding: 8px 4px; }
    .p-title { font-size: 13px; color: var(--text-gray); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
    .p-price { font-weight: 700; font-size: 16px; margin: 4px 0; }

    /* Forms */
    .form-group { margin-bottom: 15px; }
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 4px; outline: none; font-size: 14px; }
    .btn-primary { background: var(--shein-black); color: #fff; padding: 15px; border: none; width: 100%; font-weight: 700; cursor: pointer; border-radius: 4px; }
    .btn-outline { background: none; border: 1px solid var(--shein-black); padding: 10px; width: 100%; margin-top: 10px; cursor: pointer; }

    /* Bottom Nav */
    .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #fff; border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 10px 0; z-index: 2000; }
    .nav-btn { text-align: center; color: #999; cursor: pointer; flex: 1; transition: 0.2s; }
    .nav-btn.active { color: var(--shein-black); }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn p { font-size: 10px; margin-top: 2px; }

    /* Cart & Checkout */
    .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .badge-vendor { background: #e3f2fd; color: #1976d2; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>

  <header>
    <div class="logo">KOSTI MARKET</div>
    <div id="auth-status"><span class="user-status-dot"></span><span style="font-size: 11px;">زائر</span></div>
  </header>

  <section id="home" class="page-section active">
    <div style="background: var(--gray-bg); padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 13px;">⚡ عروض كوستي الكبرى تبدأ الآن!</div>
    <div id="products-list" class="products-grid">
      <p style="text-align: center; grid-column: 1/-1;">جاري تحميل أحدث الصيحات...</p>
    </div>
  </section>

  <section id="categories" class="page-section">
    <h3 style="margin-bottom: 20px;">تصفح حسب الفئة</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <button class="btn-outline" onclick="filterCategory('ملابس')">👗 ملابس</button>
      <button class="btn-outline" onclick="filterCategory('إلكترونيات')">📱 إلكترونيات</button>
      <button class="btn-outline" onclick="filterCategory('أحذية')">👟 أحذية</button>
      <button class="btn-outline" onclick="filterCategory('منزل')">🏠 المنزل</button>
    </div>
  </section>

  <section id="cart" class="page-section">
    <h3>حقيبة التسوق</h3>
    <div id="cart-container" style="margin: 20px 0;"></div>
    <div id="cart-summary" style="display: none; border-top: 2px solid var(--shein-black); padding-top: 15px;">
        <div class="form-group"><input type="text" id="cust-name" placeholder="الاسم بالكامل"></div>
        <div class="form-group"><input type="tel" id="cust-phone" placeholder="رقم الهاتف"></div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
            <span>الإجمالي (شامل الخدمة 10%):</span>
            <b id="total-price">0 ج.س</b>
        </div>
        <button class="btn-primary" onclick="sendToWhatsApp()">تأكيد الطلب عبر واتساب</button>
    </div>
  </section>

  <section id="profile" class="page-section">
    <div id="login-form">
      <h2 style="text-align:center; margin-bottom:20px;">سجل دخولك</h2>
      <div class="form-group"><input type="email" id="email" placeholder="البريد الإلكتروني"></div>
      <div class="form-group"><input type="password" id="pass" placeholder="كلمة المرور"></div>
      <button class="btn-primary" onclick="authAction('in')">دخول</button>
      <button class="btn-outline" onclick="authAction('up')">إنشاء حساب جديد</button>
    </div>

    <div id="user-profile" style="display: none;">
      <div style="text-align: center; margin-bottom: 20px;">
        <h2 id="display-email">مرحباً</h2>
        <span id="role-text" class="badge-vendor">مشتري</span>
      </div>

      <div id="vendor-area" style="display: none; background: #f9f9f9; padding: 15px; border-radius: 8px;">
        <h4>إضافة منتج جديد للبيع</h4>
        <div class="form-group"><input type="text" id="new-title" placeholder="اسم المنتج"></div>
        <div class="form-group"><input type="number" id="new-price" placeholder="السعر"></div>
        <div class="form-group"><input type="text" id="new-img" placeholder="رابط صورة المنتج (URL)"></div>
        <div class="form-group">
            <select id="new-cat">
                <option value="ملابس">ملابس</option>
                <option value="إلكترونيات">إلكترونيات</option>
                <option value="أحذية">أحذية</option>
            </select>
        </div>
        <button class="btn-primary" style="background:#27ae60" onclick="handleAddNewProduct()">نشر في الموقع</button>
      </div>
      
      <button class="btn-outline" style="color:red; border-color:red; margin-top:40px;" onclick="logout()">تسجيل الخروج</button>
    </div>
  </section>

  <nav class="bottom-nav">
    <div class="nav-btn active" onclick="nav('home')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><p>الرئيسية</p></div>
    <div class="nav-btn" onclick="nav('categories')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg><p>الفئات</p></div>
    <div class="nav-btn" onclick="nav('cart')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><p>السلة</p></div>
    <div class="nav-btn" onclick="nav('profile')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><p>حسابي</p></div>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // --- إعدادات سوبابيس (استبدل القيم ببيانات مشروعك إذا كانت مختلفة) ---
    const SB_URL = 'https://bxbglomvulnzehruubdh.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4Ymdsb212dWxuemVocnV1YmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg5MDYsImV4cCI6MjA5MjUxNDkwNn0.rqIZHvP47QugH9vG0LW8OkkmAVYEzhOwv-VUKJuEqOY';
    const supabase = window.supabase.createClient(SB_URL, SB_KEY);

    const ADMIN_WA = "249900623733"; 
    let cart = [];
    let user = null;

    // --- التنقل بين الصفحات ---
    function nav(id) {
      document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }

    // --- المحرك الرئيسي للمنتجات ---
    async function loadProducts() {
      const { data, error } = await supabase.from('products').select('*').eq('is_active', true);
      if (data) renderProducts(data);
    }

    function renderProducts(list) {
      const container = document.getElementById('products-list');
      container.innerHTML = list.map(p => `
        <div class="p-card">
          <img src="${p.images?.[0] || 'https://via.placeholder.com/300x400'}" class="p-img">
          <div class="p-info">
            <p class="p-title">${p.title}</p>
            <p class="p-price">${p.price} ج.س</p>
            <button onclick="addToCart(${p.id}, '${p.title}', ${p.price})" class="btn-outline" style="font-size:11px; padding:5px;">+ أضف للسلة</button>
          </div>
        </div>
      `).join('');
    }

    // --- السلة والواتساب ---
    function addToCart(id, title, price) {
      cart.push({id, title, price});
      updateCartUI();
      alert("تمت الإضافة للسلة ✅");
    }

    function updateCartUI() {
      const container = document.getElementById('cart-container');
      if(cart.length === 0) { container.innerHTML = "السلة فارغة"; return; }
      
      document.getElementById('cart-summary').style.display = 'block';
      container.innerHTML = cart.map((item, i) => `
        <div class="cart-item">
          <span>${item.title}</span>
          <b>${item.price} ج.س <small onclick="removeFromCart(${i})" style="color:red; cursor:pointer;">(حذف)</small></b>
        </div>
      `).join('');
      
      let subtotal = cart.reduce((acc, curr) => acc + curr.price, 0);
      document.getElementById('total-price').innerText = Math.round(subtotal * 1.1) + " ج.س";
    }

    function removeFromCart(i) { cart.splice(i,1); updateCartUI(); }

    function sendToWhatsApp() {
      const name = document.getElementById('cust-name').value;
      const phone = document.getElementById('cust-phone').value;
      if(!name || !phone) return alert("اكمل البيانات");

      let subtotal = cart.reduce((acc, curr) => acc + curr.price, 0);
      let total = Math.round(subtotal * 1.1);
      
      let msg = `*طلب جديد من Kosti Market*\n👤 العميل: ${name}\n📞 هاتف: ${phone}\n---\n`;
      cart.forEach((p, i) => msg += `${i+1}. ${p.title} (${p.price}ج)\n`);
      msg += `---\n💰 الإجمالي شامل العمولة: ${total} ج.س`;
      
      window.open(`https://wa.me/${ADMIN_WA}?text=${encodeURIComponent(msg)}`);
    }

    // --- نظام الهوية (Auth) ---
    async function authAction(type) {
      const email = document.getElementById('email').value;
      const pass = document.getElementById('pass').value;
      
      const { data, error } = (type === 'in') 
        ? await supabase.auth.signInWithPassword({ email, password: pass })
        : await supabase.auth.signUp({ email, password: pass });

      if (error) alert(error.message);
      else location.reload();
    }

    async function checkUser() {
      const { data: { user: activeUser } } = await supabase.auth.getUser();
      if (activeUser) {
        user = activeUser;
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('user-profile').style.display = 'block';
        document.getElementById('display-email').innerText = user.email;
        document.querySelector('.user-status-dot').classList.add('status-online');
        
        // جلب الصلاحيات (تاجر أم لا)
        const { data: profile } = await supabase.from('profiles').select('role').eq('id', user.id).single();
        if (profile?.role === 'vendor') {
            document.getElementById('vendor-area').style.display = 'block';
            document.getElementById('role-text').innerText = "حساب تاجر";
        }
      }
    }

    async function handleAddNewProduct() {
        const title = document.getElementById('new-title').value;
        const price = document.getElementById('new-price').value;
        const img = document.getElementById('new-img').value;
        const cat = document.getElementById('new-cat').value;

        const { error } = await supabase.from('products').insert([
            { title, price, images: [img], category: cat, vendor_id: user.id, is_active: true }
        ]);

        if (error) alert(error.message);
        else { alert("تم النشر!"); location.reload(); }
    }

    function logout() { supabase.auth.signOut(); location.reload(); }

    window.onload = () => { loadProducts(); checkUser(); };
  </script>
</body>
</html>
