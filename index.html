<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Bags | عالم الأناقة النسائية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Reem+Kufi:wght@700&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root { --main-pink: #ff4d8d; --soft-pink: #fff0f5; --gold: #d4af37; --text-dark: #2d2d2d; --wa-green: #25d366; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--soft-pink); color: var(--text-dark); overflow-x: hidden; scroll-behavior: smooth; }
        .font-title { font-family: 'Reem Kufi', sans-serif; }

        /* تصميم الاسم 3D */
        .logo-3d {
            font-size: 2rem; font-weight: 900; color: var(--main-pink);
            text-shadow: 1px 1px 0px #ffb6c1, 2px 2px 0px #ffb6c1, 3px 3px 0px #ffb6c1, 4px 4px 15px rgba(0,0,0,0.1);
            transition: 0.5s; cursor: pointer; display: inline-block;
        }
        @media (min-width: 768px) { .logo-3d { font-size: 3rem; } }
        .logo-3d:hover { transform: scale(1.1) rotate(-2deg); text-shadow: 1px 1px 0px var(--gold), 5px 5px 20px rgba(255, 77, 141, 0.3); }

        /* بطاقة المنتج */
        .bag-card {
            background: #fff; border-radius: 1.5rem; padding: 0.5rem;
            box-shadow: 10px 10px 30px #d9cad0, -10px -10px 30px #ffffff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            border: 2px solid transparent; display: flex; flex-direction: column;
        }
        @media (min-width: 768px) {
            .bag-card { border-radius: 2.5rem; padding: 1rem; box-shadow: 20px 20px 60px #d9cad0, -20px -20px 60px #ffffff; }
        }
        .bag-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--main-pink); }

        /* السلايدر بالسحب */
        .swipe-container {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
            scrollbar-width: none; cursor: grab; border-radius: 2rem; scroll-behavior: smooth;
        }
        .swipe-container::-webkit-scrollbar { display: none; }
        .swipe-item { min-width: 100%; scroll-snap-align: center; height: 300px; }
        @media (min-width: 768px) { .swipe-item { height: 400px; } }
        .swipe-item img { width: 100%; height: 100%; object-fit: cover; }

        /* الأزرار */
        .btn-primary {
            background: linear-gradient(135deg, var(--main-pink), #ff85a1);
            color: white; font-weight: 900; border-radius: 1.2rem;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(255, 77, 141, 0.2);
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(255, 77, 141, 0.4); }
        
        .btn-secondary {
            border: 2px solid #ffdae9; color: var(--main-pink);
            font-weight: 900; border-radius: 1.2rem; transition: 0.3s;
            display: flex; align-items: center; justify-content: center;
        }

        /* زر الواتساب العائم المطور */
        .wa-float {
            position: fixed;
            bottom: 25px;
            left: 25px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .wa-btn {
            width: 60px;
            height: 60px;
            background-color: var(--wa-green);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .wa-btn:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.5);
        }

        /* تأثير النبض الهادئ */
        .wa-btn::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: var(--wa-green);
            border-radius: 50%;
            z-index: -1;
            animation: pulse-wa 2s infinite;
        }

        @keyframes pulse-wa {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.7); opacity: 0; }
        }

        .wa-msg {
            background: white;
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin-bottom: 10px;
            border-right: 4px solid var(--wa-green);
            animation: fadeInRight 0.8s ease forwards;
            white-space: nowrap;
            pointer-events: none;
        }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid white;
            width: 20px; height: 20px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden-admin { display: none !important; }
        .login-input {
            width: 100%; background: #f8f8f8; border: 2px solid #eee;
            padding: 1rem; border-radius: 1rem; margin-bottom: 1rem; outline: none;
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[100] px-4 md:px-6 py-4 flex justify-between items-center bg-white/80 backdrop-blur-md border-b border-pink-100">
        <div class="logo-3d font-title">Best Bags</div>
        <div class="flex items-center gap-2 md:gap-4">
            <button id="headerLogoutBtn" onclick="openLogoutModal()" class="hidden-admin btn-secondary p-2 md:px-4 md:py-2 text-sm text-[#ff4d8d]">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            </button>
            <a href="https://wa.me/249900623733" class="btn-primary px-3 py-2 md:px-6 md:py-2 text-xs md:text-sm">تواصلِ معنا</a>
        </div>
    </nav>

    <section class="min-h-[50vh] flex flex-col justify-center items-center text-center px-4 pt-32 pb-10 bg-gradient-to-b from-white to-pink-50">
        <h1 class="font-title text-4xl md:text-7xl text-gray-800 mb-4" data-aos="zoom-in">أناقتكِ تبدأ من <span class="text-[#ff4d8d]">حقيبتكِ</span></h1>
        <p class="text-gray-500 text-sm md:text-lg max-w-xl" data-aos="fade-up">مجموعة مختارة من الحقائب الجلدية الفاخرة التي تليق بجمالكِ.</p>
        <p class="text-[#ff4d8d] font-bold mt-4 bg-white px-6 py-2 rounded-full border border-pink-100 shadow-sm inline-block" data-aos="fade-up" data-aos-delay="200">
            خشي واختاري البِعجبك واطلبي ✨
        </p>
    </section>

    <section id="gallery" class="pt-10 pb-20 max-w-7xl mx-auto px-3 md:px-6 grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-8"></section>

    <section id="adminZone" class="hidden-admin py-20 bg-white border-t-4 border-[#ff4d8d]">
        <div class="max-w-2xl mx-auto p-6 shadow-2xl rounded-[2rem]">
            <h2 class="font-title text-2xl mb-8">إضافة منتج جديد</h2>
            <input type="text" id="pName" placeholder="اسم الحقيبة" class="login-input">
            <input type="number" id="pPrice" placeholder="السعر" class="login-input">
            <textarea id="pDesc" placeholder="الوصف..." class="login-input h-32"></textarea>
            <input type="file" id="pFiles" multiple class="mb-6 block w-full text-sm">
            <button onclick="uploadProduct()" id="uploadBtn" class="btn-primary w-full py-4 text-lg">نشر المنتج</button>
        </div>
    </section>

    <footer class="py-12 text-center text-gray-400 text-xs tracking-widest relative">
        Best Bags | عالم الأناقة النسائية © 2026
        <div onclick="showLogin()" class="absolute bottom-5 left-1/2 -translate-x-1/2 w-10 h-10 cursor-pointer opacity-0"></div>
    </footer>

    <div class="wa-float" data-aos="fade-right" data-aos-delay="1000">
        <div class="wa-msg">نساعدكِ في الاختيار؟ ✨</div>
        <a href="https://wa.me/249900623733" target="_blank" class="wa-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="white" viewBox="0 0 16 16">
                <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
            </svg>
        </a>
    </div>

    <div id="productModal" class="fixed inset-0 z-[200] hidden bg-white overflow-y-auto">
        <button onclick="closeModal()" class="fixed top-5 right-5 z-[250] bg-[#ff4d8d] text-white px-6 py-3 rounded-xl font-bold shadow-lg">رجوع للمتجر ➔</button>
        <div class="max-w-6xl mx-auto min-h-screen flex flex-col lg:flex-row items-center gap-8 p-6 pt-24 lg:pt-0">
            <div class="w-full lg:w-1/2">
                <div class="swipe-container shadow-2xl border-4 border-white" id="swipeGallery"></div>
                <p class="text-center text-pink-400 text-xs mt-4 animate-pulse">اسحبي الصور للمزيد ↔</p>
            </div>
            <div class="w-full lg:w-1/2 space-y-6 text-right">
                <h2 id="modalTitle" class="font-title text-4xl text-gray-800"></h2>
                <div class="inline-block bg-pink-100 text-[#ff4d8d] px-6 py-2 rounded-full font-black text-2xl" id="modalPrice"></div>
                <p id="modalDesc" class="text-gray-600 text-lg leading-relaxed bg-pink-50/50 p-6 rounded-3xl"></p>
                <div class="grid grid-cols-1 gap-4">
                    <button id="orderWA" class="btn-primary py-5 text-xl">اطلبِ الآن عبر واتساب</button>
                </div>
            </div>
        </div>
    </div>

    <div id="loginModal" class="fixed inset-0 z-[300] hidden bg-[#ff4d8d] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-10 text-center">
            <h3 class="font-title text-2xl mb-8">دخول الإدارة</h3>
            <input type="email" id="admEmail" class="login-input text-center" placeholder="البريد">
            <input type="password" id="admPass" class="login-input text-center" placeholder="كلمة المرور">
            <button id="loginBtn" onclick="handleLogin()" class="btn-primary w-full py-4">دخول</button>
            <button onclick="hideLogin()" class="w-full mt-6 text-gray-400 text-sm underline">إغلاق</button>
        </div>
    </div>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 1000, once: true });

        const SUPABASE_URL = 'https://bxbglomvulnzehruubdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4Ymdsb212dWxuemVocnV1YmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg5MDYsImV4cCI6MjA5MjUxNDkwNn0.rqIZHvP47QugH9vG0LW8OkkmAVYEzhOwv-VUKJuEqOY';
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let productsStore = [];

        async function handleLogin() {
            const btn = document.getElementById('loginBtn');
            btn.innerHTML = '<div class="spinner"></div>';
            const { error } = await _client.auth.signInWithPassword({
                email: document.getElementById('admEmail').value,
                password: document.getElementById('admPass').value
            });
            if (error) { alert("خطأ في البيانات"); btn.innerText = "دخول"; } else { location.reload(); }
        }

        function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function hideLogin() { document.getElementById('loginModal').style.display = 'none'; }

        function openModal(id) {
            const p = productsStore.find(x => x.id == id);
            const gallery = document.getElementById('swipeGallery');
            gallery.innerHTML = p.images.map(img => `<div class="swipe-item"><img src="${img}"></div>`).join('');
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalPrice').innerText = `${p.price} SDG`;
            document.getElementById('modalDesc').innerText = p.description || "أناقة لا توصف..";
            
            document.getElementById('orderWA').onclick = () => {
                const msg = `مرحباً Best Bags ✨ أود طلب: ${p.name}`;
                window.open(`https://wa.me/249900623733?text=${encodeURIComponent(msg)}`);
            };
            document.getElementById('productModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; document.body.style.overflow = 'auto'; }

        async function uploadProduct() {
            const btn = document.getElementById('uploadBtn');
            btn.innerHTML = '<div class="spinner"></div> جاري النشر...';
            const files = document.getElementById('pFiles').files;
            let urls = [];
            for (let f of files) {
                const n = `${Date.now()}_${f.name}`;
                await _client.storage.from('product-images').upload(n, f);
                urls.push(_client.storage.from('product-images').getPublicUrl(n).data.publicUrl);
            }
            await _client.from('products').insert([{
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                description: document.getElementById('pDesc').value,
                images: urls
            }]);
            location.reload();
        }

        async function init() {
            const { data } = await _client.from('products').select('*').order('created_at', {ascending: false});
            productsStore = data || [];
            const grid = document.getElementById('gallery');
            const sess = await _client.auth.getSession();
            const isAdmin = sess.data.session;

            grid.innerHTML = productsStore.map(p => `
                <div class="bag-card" data-aos="fade-up" onclick="openModal('${p.id}')">
                    <div class="relative h-48 md:h-80 overflow-hidden rounded-[1.5rem] mb-4">
                        <img src="${p.images[0]}" class="w-full h-full object-cover">
                        <div class="absolute bottom-3 left-3 bg-white/90 px-3 py-1 rounded-full font-bold text-[#ff4d8d] text-xs shadow">${p.price} SDG</div>
                    </div>
                    <h3 class="font-title text-center text-gray-800 text-lg mb-2">${p.name}</h3>
                </div>
            `).join('');

            if(isAdmin) document.getElementById('adminZone').classList.remove('hidden-admin');
        }

        init();
    </script>
</body>
</html>
