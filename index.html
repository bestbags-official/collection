<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-NASR | فخامة الجلود الطبيعية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&family=Amiri:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #1a1a1a; /* أسود فحمي */
            --accent-gold: #c5a059; /* ذهبي مطفي */
            --text-muted: #a0a0a0;
        }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-deep); color: #eeeeee; scroll-behavior: smooth; }
        .luxury-text { font-family: 'Amiri', serif; }
        .glass-dark { background: rgba(30, 30, 30, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .product-card { background: #242424; transition: all 0.5s ease; border: 1px solid rgba(255,255,255,0.03); }
        .product-card:hover { transform: translateY(-10px); border-color: var(--accent-gold); }
        .admin-controls { display: none; }
        .btn-gold { background: var(--accent-gold); color: #1a1a1a; transition: all 0.3s; }
        .btn-gold:hover { background: #e0b96b; transform: scale(1.05); }
    </style>
</head>
<body>

    <nav class="glass-dark fixed top-0 w-full z-50 px-8 py-6 flex justify-between items-center">
        <div class="luxury-text text-3xl font-bold tracking-tighter text-[#c5a059]">AL-NASR</div>
        <div class="flex gap-6 text-[10px] font-bold uppercase tracking-[0.2em]">
            <a href="#collection" class="hover:text-[#c5a059] transition">المجموعة</a>
            <a href="https://wa.me/249900623733" class="text-[#c5a059]">تواصل مباشر</a>
        </div>
    </nav>

    <section class="h-[90vh] flex flex-col justify-center items-center text-center px-6 relative overflow-hidden">
        <div class="absolute inset-0 opacity-20" style="background-image: url('https://www.transparenttextures.com/patterns/leather.png');"></div>
        <div class="z-10">
            <h1 class="luxury-text text-5xl md:text-8xl mb-6 leading-tight">سِحر الجِلد الطبيعي</h1>
            <p class="max-w-2xl text-gray-400 text-lg font-light mb-12 leading-relaxed italic">قطع فريدة تُصنع يدوياً في كوستي، لترافقكِ في أجمل لحظات العمر.</p>
            <a href="#collection" class="btn-gold px-12 py-4 rounded-full font-bold text-sm shadow-2xl">تصفح المعرض الآن</a>
        </div>
    </section>

    <section id="collection" class="py-32 max-w-7xl mx-auto px-8">
        <div class="text-center mb-24">
            <h2 class="luxury-text text-4xl mb-4">المجموعة المختارة</h2>
            <p class="text-gray-500 text-sm tracking-widest uppercase">حصرياً في حي النصر - مربع 8</p>
        </div>
        
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            </div>
    </section>

    <section id="adminPanel" class="admin-controls py-24 bg-[#111] border-t border-[#c5a059]/20">
        <div class="max-w-2xl mx-auto px-6 bg-[#1a1a1a] p-10 rounded-3xl border border-white/5">
            <h2 class="text-2xl font-bold mb-8 text-[#c5a059]">إدارة المتجر - إضافة منتج</h2>
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="اسم القطعة" class="w-full bg-[#222] border-none p-4 rounded-xl text-white outline-none">
                <input type="number" id="pPrice" placeholder="السعر" class="w-full bg-[#222] border-none p-4 rounded-xl text-white outline-none">
                <textarea id="pDesc" placeholder="وصف القطعة (اختياري)" class="w-full bg-[#222] border-none p-4 rounded-xl h-32 text-white outline-none"></textarea>
                <input type="file" id="pFiles" multiple class="block w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-[#c5a059] file:text-black">
                <button onclick="uploadProduct()" id="uploadBtn" class="w-full py-4 btn-gold rounded-xl font-bold">نشر الآن</button>
            </div>
        </div>
    </section>

    <footer class="py-20 border-t border-white/5 text-center">
        <p class="text-[10px] text-gray-600 tracking-widest uppercase mb-4">© 2026 AL-NASR LEATHER LUXURY</p>
        <button onclick="showLogin()" class="text-gray-700 hover:text-[#c5a059] transition text-xs">إدارة [اسم صاحب الموقع]</button>
    </footer>

    <div id="loginModal" class="fixed inset-0 bg-black/95 z-[100] hidden items-center justify-center p-6 backdrop-blur-md">
        <div class="w-full max-w-sm text-center">
            <h3 class="luxury-text text-3xl mb-8 text-[#c5a059]">دخول الإدارة</h3>
            <input type="email" id="email" placeholder="البريد" class="w-full bg-transparent border-b border-gray-700 py-4 mb-6 outline-none text-center">
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full bg-transparent border-b border-gray-700 py-4 mb-10 outline-none text-center">
            <button onclick="handleLogin()" class="btn-gold w-full py-4 rounded-full font-bold">دخول</button>
            <button onclick="hideLogin()" class="mt-6 text-gray-500 text-xs">إلغاء</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bxbglomvulnzehruubdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4Ymdsb212dWxuemVocnV1YmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg5MDYsImV4cCI6MjA5MjUxNDkwNn0.rqIZHvP47QugH9vG0LW8OkkmAVYEzhOwv-VUKJuEqOY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let isAdmin = false;

        // وظيفة حفظ الصورة مع الرسالة التوجيهية
        function saveImage(url, name) {
            alert("✨ ملاحظة: احفظ الصورة الآن في جهازك، وإذا أعجبك المنتج اضغط على زر 'اطلب هنا' لإرسال الصورة لصاحب الموقع عبر الواتساب.");
            const a = document.createElement('a');
            a.href = url;
            a.download = `AlNasr_${name}.jpg`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function hideLogin() { document.getElementById('loginModal').style.display = 'none'; }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) alert("خطأ في بيانات الدخول");
            else {
                isAdmin = true;
                hideLogin();
                document.getElementById('adminPanel').style.display = 'block';
                renderProducts(); // إعادة التحميل لإظهار أزرار الحذف
            }
        }

        async function deleteProduct(id) {
            if(confirm("هل أنت متأكد من حذف هذا المنتج نهائياً؟")) {
                await _supabase.from('products').delete().eq('id', id);
                location.reload();
            }
        }

        async function uploadProduct() {
            const btn = document.getElementById('uploadBtn');
            const files = document.getElementById('pFiles').files;
            btn.innerText = "جاري الحفظ...";
            
            try {
                let imageUrls = [];
                for (let file of files) {
                    const fName = `${Date.now()}_${file.name}`;
                    await _supabase.storage.from('product-images').upload(fName, file);
                    const { data: urlData } = _supabase.storage.from('product-images').getPublicUrl(fName);
                    imageUrls.push(urlData.publicUrl);
                }

                await _supabase.from('products').insert([{
                    name: document.getElementById('pName').value,
                    price: document.getElementById('pPrice').value,
                    description: document.getElementById('pDesc').value,
                    images: imageUrls
                }]);
                
                alert("تمت الإضافة!");
                location.reload();
            } catch (err) { alert("حدث خطأ في الرفع"); }
        }

        async function renderProducts() {
            const { data } = await _supabase.from('products').select('*').order('created_at', {ascending: false});
            const grid = document.getElementById('productsGrid');
            
            // منتجات تجريبية لو المتجر فاضي
            const list = (data && data.length > 0) ? data : [
                { id: '1', name: "حقيبة النصر الفاخرة", price: "50,000", images: ["https://images.unsplash.com/photo-1548036328-c9fa89d128fa?q=80&w=800"] }
            ];

            grid.innerHTML = list.map(p => `
                <div class="product-card rounded-[2rem] overflow-hidden p-4 relative group">
                    <div class="relative overflow-hidden rounded-[1.5rem] aspect-[4/5] mb-6">
                        <img src="${p.images[0]}" class="w-full h-full object-cover transition duration-700 group-hover:scale-110">
                        <button onclick="saveImage('${p.images[0]}', '${p.name}')" class="absolute top-4 left-4 bg-black/50 backdrop-blur-md p-3 rounded-full opacity-0 group-hover:opacity-100 transition">
                            <svg width="20" height="20" fill="white" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                        </button>
                    </div>
                    <div class="px-4 pb-4">
                        <h3 class="luxury-text text-2xl mb-2">${p.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-[#c5a059] font-bold">${p.price} SDG</span>
                            <a href="https://wa.me/249900623733?text=طلب_${p.name}" class="text-[10px] uppercase font-bold border-b border-[#c5a059] pb-1 hover:text-white transition">اطلب هنا</a>
                        </div>
                        ${isAdmin ? `<button onclick="deleteProduct('${p.id}')" class="mt-4 text-red-500 text-[10px] underline">حذف المنتج 🗑️</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        renderProducts();
    </script>
</body>
</html>
