<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AL-NASR | الفخامة اليدوية 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600;900&family=Amiri:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #c5a059; --dark: #0f0f0f; --card-bg: #181818; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--dark); color: #fff; overflow-x: hidden; }
        .luxury-font { font-family: 'Amiri', serif; }
        
        /* تأثيرات 3D والزجاج */
        .glass-header { background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .product-3d { 
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }
        .product-3d:hover { 
            transform: perspective(1000px) rotateX(5deg) rotateY(-5deg) translateY(-10px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        /* نافذة التفاصيل */
        #detailsModal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        .modal-content { animation: slideUp 0.6s ease-out; }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .hidden-admin { display: none; }
        .btn-premium { background: linear-gradient(135deg, #c5a059 0%, #9e7d3e 100%); transition: 0.3s; }
        .btn-premium:hover { transform: scale(1.05); filter: brightness(1.2); }
    </style>
</head>
<body>

    <nav class="glass-header fixed top-0 w-full z-[100] px-10 py-6 flex justify-between items-center">
        <div class="luxury-font text-3xl font-bold tracking-tighter text-[#c5a059]">AL-NASR</div>
        <div class="flex gap-8 text-[10px] font-bold uppercase tracking-[0.3em]">
            <a href="#collection" class="hover:text-[#c5a059] transition">المجموعة</a>
            <a href="https://wa.me/249900623733" class="text-[#c5a059]">اتصال مباشر</a>
        </div>
    </nav>

    <section class="h-screen flex flex-col justify-center items-center text-center px-6">
        <div class="relative">
            <h1 class="luxury-font text-6xl md:text-9xl mb-4 opacity-10 absolute -top-20 left-1/2 -translate-x-1/2 w-full">HANDMADE</h1>
            <h2 class="luxury-font text-5xl md:text-8xl mb-8 leading-tight relative z-10">إتقان يروي <br><span class="text-[#c5a059] italic">قصة فخامة</span></h2>
        </div>
        <p class="max-w-xl text-gray-500 text-lg font-light mb-12 italic">من "النصر مربع 8" إلى العالم.. جلود طبيعية بلمسة عصرية.</p>
        <a href="#collection" class="btn-premium px-14 py-4 rounded-full text-black font-black text-sm shadow-[0_0_30px_rgba(197,160,89,0.3)]">استكشاف المعرض</a>
    </section>

    <section id="collection" class="py-32 max-w-7xl mx-auto px-8">
        <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-16">
            </div>
    </section>

    <section id="adminPanel" class="hidden-admin py-24 bg-[#111] border-t border-[#c5a059]/20">
        <div class="max-w-2xl mx-auto px-6 bg-[#181818] p-10 rounded-[3rem]">
            <h2 class="text-2xl font-bold mb-8 text-[#c5a059]">نشر قطعة جديدة</h2>
            <div class="space-y-4">
                <input type="text" id="pName" placeholder="اسم المنتج" class="w-full bg-[#222] border-none p-5 rounded-2xl text-white outline-none">
                <input type="number" id="pPrice" placeholder="السعر" class="w-full bg-[#222] border-none p-5 rounded-2xl text-white outline-none">
                <textarea id="pDesc" placeholder="الوصف الفني للقطعة..." class="w-full bg-[#222] border-none p-5 rounded-2xl h-32 text-white outline-none"></textarea>
                <input type="file" id="pFiles" multiple class="block w-full text-sm text-gray-500 file:bg-[#c5a059] file:rounded-full file:border-0 file:px-6 file:py-2 file:mr-4">
                <button onclick="uploadProduct()" id="uploadBtn" class="w-full py-5 btn-premium rounded-2xl font-bold text-black">تأكيد النشر</button>
            </div>
        </div>
    </section>

    <div id="detailsModal" class="flex items-center justify-center p-4">
        <div class="modal-content bg-[#181818] w-full max-w-5xl rounded-[3rem] overflow-hidden flex flex-col md:flex-row relative">
            <button onclick="closeDetails()" class="absolute top-6 right-6 z-50 bg-black/50 p-3 rounded-full text-white">✕</button>
            
            <div class="md:w-1/2 h-[500px] bg-black">
                <img id="modalMainImg" class="w-full h-full object-cover">
                <div id="modalThumbnails" class="absolute bottom-4 left-4 flex gap-2"></div>
            </div>

            <div class="md:w-1/2 p-12 flex flex-col justify-center">
                <h3 id="modalTitle" class="luxury-font text-4xl mb-4 text-[#c5a059]"></h3>
                <p id="modalPrice" class="text-2xl font-bold mb-6"></p>
                <p id="modalDesc" class="text-gray-400 leading-relaxed mb-10 h-32 overflow-y-auto"></p>
                
                <div class="flex gap-4">
                    <a id="modalWaBtn" href="#" target="_blank" class="flex-1 btn-premium py-4 rounded-2xl text-center text-black font-bold shadow-lg">اطلب الآن</a>
                    <button id="modalDlBtn" class="bg-white/10 p-4 rounded-2xl hover:bg-white/20 transition">
                        <svg width="24" height="24" fill="white" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                    </button>
                </div>
                
                <div class="mt-8 pt-8 border-t border-white/5">
                    <p class="text-[10px] text-gray-500 uppercase tracking-widest">منتجات مشابهة قد تنال إعجابك</p>
                    <div id="relatedProducts" class="flex gap-4 mt-4 overflow-x-auto pb-4"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-20 text-center opacity-50">
        <button onclick="showLogin()" class="text-[10px] tracking-[0.5em] uppercase hover:text-[#c5a059]">مدير الموقع</button>
    </footer>

    <div id="loginModal" class="fixed inset-0 bg-black/98 z-[200] hidden items-center justify-center">
        <div class="w-80 text-center">
            <h3 class="luxury-font text-2xl mb-8 text-[#c5a059]">دخول آمن</h3>
            <input type="email" id="email" placeholder="البريد" class="w-full bg-transparent border-b border-gray-800 py-4 mb-6 outline-none text-center">
            <input type="password" id="password" placeholder="كلمة المرور" class="w-full bg-transparent border-b border-gray-800 py-4 mb-10 outline-none text-center">
            <button onclick="handleLogin()" class="btn-premium w-full py-4 rounded-full text-black font-bold">دخول</button>
            <button onclick="hideLogin()" class="mt-6 text-gray-600 text-xs">إلغاء</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bxbglomvulnzehruubdh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ4Ymdsb212dWxuemVocnV1YmRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5Mzg5MDYsImV4cCI6MjA5MjUxNDkwNn0.rqIZHvP47QugH9vG0LW8OkkmAVYEzhOwv-VUKJuEqOY';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentProducts = [];

        // أمان: تسجيل خروج عند عمل Refresh
        window.onbeforeunload = function() {
            _supabase.auth.signOut();
        };

        function showLogin() { document.getElementById('loginModal').style.display = 'flex'; }
        function hideLogin() { document.getElementById('loginModal').style.display = 'none'; }

        async function handleLogin() {
            const { error } = await _supabase.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });
            if (error) alert("بيانات خاطئة");
            else {
                hideLogin();
                document.getElementById('adminPanel').style.display = 'block';
                alert("أهلاً بك يا مدير.. يمكنك الآن إضافة وحذف المنتجات");
            }
        }

        async function uploadProduct() {
            const btn = document.getElementById('uploadBtn');
            const files = document.getElementById('pFiles').files;
            btn.innerText = "جاري النشر...";
            
            try {
                let imageUrls = [];
                for (let file of files) {
                    const fName = `${Date.now()}_${file.name}`;
                    await _supabase.storage.from('product-images').upload(fName, file);
                    const { data: urlData } = _supabase.storage.from('product-images').getPublicUrl(fName);
                    imageUrls.push(urlData.publicUrl);
                }

                await _supabase.from('products').insert([{
                    name: document.getElementById('pName').value,
                    price: document.getElementById('pPrice').value,
                    description: document.getElementById('pDesc').value,
                    images: imageUrls
                }]);
                location.reload();
            } catch (err) { alert("حدث خطأ"); }
        }

        async function deleteProduct(id) {
            if(confirm("حذف هذه القطعة نهائياً؟")) {
                await _supabase.from('products').delete().eq('id', id);
                location.reload();
            }
        }

        // تنزيل مباشر للصورة بضغطة زر
        async function downloadImage(url, name) {
            const response = await fetch(url);
            const blob = await response.blob();
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.download = `AlNasr_${name}.jpg`;
            link.click();
        }

        function openDetails(id) {
            const p = currentProducts.find(x => x.id == id);
            document.getElementById('modalMainImg').src = p.images[0];
            document.getElementById('modalTitle').innerText = p.name;
            document.getElementById('modalPrice').innerText = `${p.price} SDG`;
            document.getElementById('modalDesc').innerText = p.description || "جلد طبيعي فاخر، صُنع يدوياً بدقة عالية في ورشة النصر.";
            document.getElementById('modalWaBtn').href = `https://wa.me/249900623733?text=أريد_طلب_هذه_القطعة:_${p.name}`;
            document.getElementById('modalDlBtn').onclick = () => downloadImage(p.images[0], p.name);
            
            // صور مصغرة
            const thumbs = document.getElementById('modalThumbnails');
            thumbs.innerHTML = p.images.map(img => `<img src="${img}" onclick="document.getElementById('modalMainImg').src='${img}'" class="w-12 h-12 rounded-lg border border-white/20 cursor-pointer object-cover">`).join('');
            
            // منتجات مشابهة
            const related = document.getElementById('relatedProducts');
            related.innerHTML = currentProducts.slice(0,3).map(rp => `<img src="${rp.images[0]}" onclick="openDetails('${rp.id}')" class="w-20 h-20 rounded-2xl object-cover cursor-pointer hover:scale-105 transition">`).join('');

            document.getElementById('detailsModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeDetails() {
            document.getElementById('detailsModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        async function renderProducts() {
            const { data } = await _supabase.from('products').select('*').order('created_at', {ascending: false});
            currentProducts = data || [];
            const grid = document.getElementById('productsGrid');
            
            grid.innerHTML = currentProducts.map(p => `
                <div class="product-3d group relative bg-[#181818] p-4 rounded-[2.5rem]">
                    <div class="relative overflow-hidden rounded-[2rem] aspect-[4/5] mb-6 cursor-pointer" onclick="openDetails('${p.id}')">
                        <img src="${p.images[0]}" class="w-full h-full object-cover grayscale-[30%] group-hover:grayscale-0 transition duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent opacity-0 group-hover:opacity-100 transition-all flex items-end p-8">
                            <span class="text-xs tracking-[0.2em] font-bold uppercase">عرض التفاصيل</span>
                        </div>
                    </div>
                    <div class="px-2">
                        <h3 class="luxury-font text-2xl mb-2">${p.name}</h3>
                        <div class="flex justify-between items-center">
                            <span class="text-[#c5a059] font-bold">${p.price} SDG</span>
                            <button onclick="openDetails('${p.id}')" class="text-[9px] uppercase tracking-widest border border-white/10 px-4 py-2 rounded-full hover:bg-white hover:text-black transition">استعراض</button>
                        </div>
                        <button onclick="deleteProduct('${p.id}')" class="admin-only hidden mt-4 text-red-500 text-[10px] underline">إزالة</button>
                    </div>
                </div>
            `).join('');

            // إظهار أزرار الحذف لو المدير مسجل دخول
            const session = await _supabase.auth.getSession();
            if(session.data.session) {
                document.querySelectorAll('.admin-only').forEach(el => el.classList.remove('hidden'));
                document.getElementById('adminPanel').classList.remove('hidden-admin');
            }
        }

        renderProducts();
    </script>
</body>
</html>
